version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: luminalib_db
    environment:
      POSTGRES_USER: luminalib
      POSTGRES_PASSWORD: luminalib
      POSTGRES_DB: luminalib
    ports:
      - "5433:5432"   # host 5433 to avoid conflict with local PostgreSQL on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luminalib -d luminalib"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  api:
    build:
      context: ./backend
    container_name: luminalib_api
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql+asyncpg://luminalib:luminalib@db:5432/luminalib
      SECRET_KEY: dev-secret-change-in-prod
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/uploads
    volumes:
      - ./backend/uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luminalib_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    restart: always

volumes:
  pgdata: